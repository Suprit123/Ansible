---

- name: Configure motd banner
  hosts: cisco
  gather_facts: false
  connection: network_cli

  # Configure the login banner on Cisco IOS devices
  tasks:
    - name: Set the motd banner
      cisco.ios.ios_banner:
        banner: motd
        text: |
          **************************
          Contact Your Network Admin
          **************************
        state: present
  # Verify the banner configuration
    - name: Verify the banner configuration
      cisco.ios.ios_command:
        commands:
          - show banner motd
      register: output
  # Print the banner output
    - name: Display the banner output
      ansible.builtin.debug:
        msg: "{{ output }}"
