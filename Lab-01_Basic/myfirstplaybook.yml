# --- Start of the playbook ---
# This playbook configures Loopback0 on router R1, verifies configuration,
# and displays interface details using Cisco IOS modules.

# Play name: describes the high-level action
- name: Configure loopback0 on R1

# Target hosts from the Ansible inventory
  hosts: routers

# Disable fact gathering to improve performance for network devices
  gather_facts: false

# Specify that the connection to devices will be through CLI (SSH)
  connection: network_cli

# Begin list of tasks
  tasks:

    # Task 1: Configure the Loopback0 interface
    - name: Configure loopback0 interface on R1

      # Use the ios_config module from the cisco.ios collection to push config lines
      cisco.ios.ios_config:

        # Define the parent configuration context
        parents: interface loopback 0

        # Configuration lines to apply under the 'interface loopback 0' context
        lines:
          # Assign IP address and subnet mask to the Loopback0 interface
          - ip add 10.10.10.10 255.255.255.255
          # Enable the interface administratively
          - no shutdown
          # Add a description to the interface for documentation
          - description *** Configured via Ansible ***

      # Register the output/result of the ios_config task in a variable
      register: config_output


    # Task 2: Display the configuration result stored in 'config_output'
    - name: Show the config_output

      # Use Ansible’s built-in debug module to print variable data
      ansible.builtin.debug:
        # Display the value of config_output (contains changes made, commands sent, etc.)
        msg: "{{ config_output }}"


    # Task 3: Run verification commands to check interface status and description
    - name: Output for show ip interface brief and interface description

      # Use the ios_command module to execute show commands on the device
      cisco.ios.ios_command:
        # List of Cisco IOS commands to execute
        commands:
          # Show summary of all interfaces and their IPs/status
          - show ip int brief
          # Show interface descriptions
          - show interface desc

      # Register the output/result of the ios_command task in a variable
      register: show_int_details


    # Task 4: Display the verification output stored in 'show_int_details'
    - name: Show version output

      # Use Ansible’s debug module again to print command outputs
      ansible.builtin.debug:
        # Display the content of show_int_details (contains command outputs)
        msg: "{{ show_int_details }}"
