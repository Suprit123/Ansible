# In these lab we are going to get the values from the host Variables file which are under host_vars folder.
---
- name: Configure loopback using Host Variables
  hosts: routers
  gather_facts: false
  connection: network_cli

  tasks:
    - name: Configure loopback interface
      cisco.ios.ios_config:
        parents: interface {{ interface_number }} # Double curly brackets are used to define the Variables
        lines:
          - ip address {{ interface_ip }} {{ interface_mask }}
