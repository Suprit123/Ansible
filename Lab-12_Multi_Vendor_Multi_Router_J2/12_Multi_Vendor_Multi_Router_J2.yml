---
- name: Configure Multivendor OSPF
  hosts: multivendor
  gather_facts: false
  connection: network_cli

  tasks:
    - name: Configure IOS devices using J2
      cisco.ios.ios_config:
        # Need to split the lines as ios_config expects a list of lines
        lines: "{{ lookup('template', 'cisco.j2').split('\n') }}"
      register: ios_output
      when: ansible_network_os == 'ios'

    - name: Display IOS Config OutPut
      ansible.builtin.debug:
        msg: "{{ ios_output }}"
      when: ansible_network_os == 'ios' 

    - name: Configure VyOs using J2
      vyos.vyos.vyos_config:
        lines: "{{ lookup('template', 'vyos.j2') }}"
      register: vyos_output
      when: ansible_network_os == 'vyos'

    - name: Display VyOS Config OutPut
      ansible.builtin.debug:
        msg: "{{ vyos_output }}"
      when: ansible_network_os == 'vyos'

  # Validation Tasks using cli_command module using conditional statements
    - name: Validate OSPF Configuration
      ansible.netcommon.cli_command:
        command: |
          {% if ansible_network_os == 'ios' %}
          show ip ospf neighbor
          show ip int brief
          {% else %}
          show ip ospf neighbor
          show interfaces
          {% endif %}
      register: ospf_output
      when: ansible_network_os in ['ios', 'vyos']
    
    - name: Display OSPF Neighbors
      ansible.builtin.debug:
        msg: "{{ ospf_output.stdout_lines }}"
      when: ansible_network_os in ['ios', 'vyos']